apiVersion: deployments.plural.sh/v1alpha1
kind: ServiceDeployment
metadata:
  name: n8n-oauth-proxy-config-{{ context.cluster }}
  namespace: apps
spec:
{% if context.ai %}
  agentId: {{ context.ai.session.agent_id }}
{% endif %}
  namespace: n8n
  git:
    folder: helm/n8n/{{ context.cluster }}
    ref: main
  repositoryRef:
    kind: GitRepository
    name: infra
    namespace: infra
  helm:
    version: "x.x.x"
    chart: oidc-config
    url: https://pluralsh.github.io/module-library
    valuesFiles:
    - oauth-proxy-config.yaml.liquid
  imports:
  - stackRef:
      name: n8n-{{ context.cluster }}
      namespace: apps
  configuration:
    cluster: {{ context.cluster }}
    hostname: {{ context.hostname }}
    stackName: n8n-{{ context.cluster }}
  clusterRef:
    kind: Cluster
    name: {{ context.cluster }}
    namespace: infra

