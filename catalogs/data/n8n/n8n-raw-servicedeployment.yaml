apiVersion: deployments.plural.sh/v1alpha1
kind: ServiceDeployment
metadata:
  name: n8n-raw-{{ context.cluster }}
  namespace: apps
spec:
{% if context.ai %}
  agentId: {{ context.ai.session.agent_id }}
{% endif %}
  namespace: n8n
  git:
    folder: services/apps/n8n
    ref: main
  repositoryRef:
    kind: GitRepository
    name: infra
    namespace: infra
  configuration:
    hostname: {{ context.hostname }}
  clusterRef:
    kind: Cluster
    name: {{ context.cluster }}
    namespace: infra

