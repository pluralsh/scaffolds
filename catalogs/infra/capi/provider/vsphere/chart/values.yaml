nameOverride: capv
fullnameOverride: ""

# Install CAPV through the Cluster API Operator. Requires core CAPI, kubeadm
# bootstrap, and kubeadm control-plane providers on the management cluster.
operator:
  enabled: true
  namespace: capv-system

cluster-api-provider-vsphere:
  version: v1.16.1
  controllerManager:
    manager:
      image:
        repository: registry.k8s.io/cluster-api-vsphere/cluster-api-vsphere-controller
        tag: v1.16.1

credentials:
  # vCenter or ESXi endpoint used by the CAPV controller.
  server: ""
  username: ""
  password: ""
  # TLS certificate thumbprint (colon-separated hex). Required for self-signed certs.
  thumbprint: ""
