apiVersion: deployments.plural.sh/v1alpha1
kind: Pipeline
metadata:
  name: {{ context.fleet }}-fleet-upgrade
spec:
  stages:
{% if context.cloud == 'azure' %}
    - name: dev-cp
      services:
        - serviceRef:
            name: {{ context.fleet }}-dev
            namespace: infra
          criteria:
            prAutomationRef:
              name: fleet-upgrade-pra
    - name: dev-nodes
      services:
        - serviceRef:
            name: {{ context.fleet }}-dev
            namespace: infra
          criteria:
            prAutomationRef:
              name: fleet-upgrade-pra
    - name: prod-cp
      services:
        - serviceRef:
            name: {{ context.fleet }}-prod
            namespace: infra
          criteria:
            prAutomationRef:
              name: fleet-upgrade-pra
    - name: prod-nodes
      services:
        - serviceRef:
            name: {{ context.fleet }}-prod
            namespace: infra
          criteria:
            prAutomationRef:
              name: fleet-upgrade-pra
{% else %}
    - name: dev
      services:
        - serviceRef:
            name: {{ context.fleet }}-dev
            namespace: infra
          criteria:
            prAutomationRef:
              name: fleet-upgrade-pra
    - name: prod
      services:
        - serviceRef:
            name: {{ context.fleet }}-prod
            namespace: infra
          criteria:
            prAutomationRef:
              name: fleet-upgrade-pra
{% endif %}
  edges:
{% if context.cloud == 'azure' %}
  - from: dev-cp
    to: dev-nodes
  - from: dev-nodes
    to: prod-cp
    gates:
    - name: approval-gate
      type: APPROVAL
  - from: prod-cp
    to: prod-nodes
{% else %}
  - from: dev
    to: prod
    gates:
    - name: approval-gate
      type: APPROVAL
{% endif %}
