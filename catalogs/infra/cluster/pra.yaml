{% raw %}
apiVersion: deployments.plural.sh/v1alpha1
kind: PrAutomation
metadata:
  name: fleet-upgrade-pra
spec:
  name: fleet-upgrade-pra
  documentation: |
    Updates the k8s version for a fleet pipeline stage. On AWS/GCP this bumps
    kubernetesVersion. On Azure, stage names ending in -cp bump nextKubernetesVersion
    (control plane) and stages ending in -nodes bump kubernetesVersion (node pools).
  updates:
    regexReplacements:
    - regex: '(?m)kubernetesVersion: ([^\r\n]*) # {{ context.pipeline.stage.name }}$'
      file: "services/{{ context.fleet }}/setup/services.yaml"
      replacement: "kubernetesVersion: \"{{ context.version }}\" # {{ context.pipeline.stage.name }}"
    - regex: '(?m)nextKubernetesVersion: ([^\r\n]*) # {{ context.pipeline.stage.name }}$'
      file: "services/{{ context.fleet }}/setup/services.yaml"
      replacement: 'nextKubernetesVersion: "{{ context.version }}" # {{ context.pipeline.stage.name }}'
    - regex: '{% if context.pipeline.stage.name == "dev" or context.pipeline.stage.name == "dev-nodes" %}(?m)kubernetes_version: "{{ configuration.kubernetesVersion }}"(?: # [^\r\n]*)?${% else %}a^{% endif %}'
      file: 'services/{{ context.fleet }}/clusters/dev/{{ context.fleet }}-dev.yaml.liquid'
      replacement: 'kubernetes_version: "{{ configuration.kubernetesVersion }}" # {{ context.pipeline.stage.name }} {{ context.version }}'
    - regex: '{% if context.pipeline.stage.name == "prod" or context.pipeline.stage.name == "prod-nodes" %}(?m)kubernetes_version: "{{ configuration.kubernetesVersion }}"(?: # [^\r\n]*)?${% else %}a^{% endif %}'
      file: 'services/{{ context.fleet }}/clusters/prod/{{ context.fleet }}-prod.yaml.liquid'
      replacement: 'kubernetes_version: "{{ configuration.kubernetesVersion }}" # {{ context.pipeline.stage.name }} {{ context.version }}'
    - regex: '{% if context.pipeline.stage.name == "dev-cp" %}(?m)next_kubernetes_version: "{{ configuration.nextKubernetesVersion \| default: configuration.kubernetesVersion }}"(?: # [^\r\n]*)?${% else %}a^{% endif %}'
      file: 'services/{{ context.fleet }}/clusters/dev/{{ context.fleet }}-dev.yaml.liquid'
      replacement: 'next_kubernetes_version: "{{ configuration.nextKubernetesVersion | default: configuration.kubernetesVersion }}" # {{ context.pipeline.stage.name }} {{ context.version }}'
    - regex: '{% if context.pipeline.stage.name == "prod-cp" %}(?m)next_kubernetes_version: "{{ configuration.nextKubernetesVersion \| default: configuration.kubernetesVersion }}"(?: # [^\r\n]*)?${% else %}a^{% endif %}'
      file: 'services/{{ context.fleet }}/clusters/prod/{{ context.fleet }}-prod.yaml.liquid'
      replacement: 'next_kubernetes_version: "{{ configuration.nextKubernetesVersion | default: configuration.kubernetesVersion }}" # {{ context.pipeline.stage.name }} {{ context.version }}'
  scmConnectionRef:
    name: plural
  title: "Updating {{ context.fleet }} {{ context.pipeline.stage.name }} clusters to {{ context.version }}"
  message: |
    Updating {{ context.fleet }} {{ context.pipeline.stage.name }} clusters to {{ context.version }}

    Plural Service: mgmt/{{ context.fleet }}-setup
  identifier: mgmt
  configuration:
  - name: fleet
    type: STRING
    documentation: "the fleet to update"
  - name: version
    type: STRING
    documentation: The k8s version to use
{% endraw %}