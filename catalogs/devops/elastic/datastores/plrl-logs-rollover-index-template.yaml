apiVersion: dbs.plural.sh/v1alpha1
kind: ElasticsearchIndexTemplate
metadata:
  name: plrl-logs-rollover
  namespace: elastic
  annotations:
    deployment.plural.sh/sync-wave: "7"
spec:
  name: plrl-logs-rollover
  credentialsRef:
    name: elasticsearch
  definition:
    indexPatterns:
      - "plrl-logs-0*"
    priority: 300
    template:
      mappings:
        properties:
          "@timestamp":
            type: date
      settings:
        index:
          number_of_shards: 5
          number_of_replicas: 1
          refresh_interval: 30s
          sort.field: "@timestamp"
          sort.order: desc
          lifecycle:
            name: plrl-logs-rollover
            rollover_alias: plrl-logs-write
