apiVersion: platform.plural.sh/v1alpha1
kind: PrContracts
metadata:
  name: workspaces
spec:
  workdir: test/outputs
  templates:
    from: catalogs/data/airbyte
    to: test/outputs/catalogs/data/airbyte
  automations:
  - file: ../../setup/catalogs/data/airbyte.yaml
    context: ../contexts/airbyte.yaml
  - file: ../../setup/catalogs/devops/tempo.yaml
    context: ../contexts/tempo.yaml
  - file: ../../setup/catalogs/devops/opentelemetry-demo.yaml
    context: ../contexts/opentelemetry-demo.yaml
